<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تماس با ما</title>

    <!-- فونت -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- آیکون -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style3.css">
</head>

<body>

    <section class="contact-page">

        <div class="contact-box">

            <!-- سمت راست فرم -->
            <div class="left">
                <div class="logo">
                    <img src="icon2.png" alt="بیوتی شاپ">
                </div>
                <span class="badge"> ارتباط با ما</span>
                <h1>تماس با ما</h1>

                <p class="subtitle">
                    اگر سوال، پیشنهاد یا نظری داری خوشحال می‌شویم پیام خودت را برای ما ارسال کنی.
                </p>

                <form id="contactForm">

                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="name" placeholder="نام شما">
                    </div>

                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="ایمیل">
                    </div>

                    <div class="input-box textarea-box">
                        <i class="fa-solid fa-message"></i>
                        <textarea id="message" placeholder="پیام شما..."></textarea>
                    </div>

                    <button type="button" id="sendBtn">
                        <i class="fa-solid fa-paper-plane"></i>
                        ارسال پیام
                    </button>

                </form>

                <!-- Toast -->
                <div id="toast" class="toast"></div>
            </div>


            <!-- سمت چپ اطلاعات -->
            <div class="right">

                <div class="circle one"></div>
                <div class="circle two"></div>

                <h2>راه‌های ارتباطی</h2>

                <div class="contact-item">
                    <i class="fa-solid fa-phone"></i>
                    <span>0912 000 0000</span>
                </div>

                <div class="contact-item">
                    <i class="fa-solid fa-envelope"></i>
                    <span>info@yourwebsite.com</span>
                </div>

                <div class="contact-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Tehran, Iran</span>
                </div>

            </div>

        </div>

    </section>
    <script src="js/calling.js">

    </script>

</body>

</html>
