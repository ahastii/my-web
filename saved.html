<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>محصولات ذخیره شده</title>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --pink: #ff4d94;
            --purple: #8f5bff;
            --bg1: #fff7fb;
            --bg2: #f7f9ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Vazirmatn;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, var(--bg1), var(--bg2), #fff1f8, #e9fff5);
            background-size: 400% 400%;
            animation: bgMove 12s ease infinite;
            color: var(--text);
        }

        @keyframes bgMove {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }


        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: left;
            align-items: center;
            padding: 18px 35px;
            background: rgba(255, 255, 255, .75);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .05);
        }


        .info-box {
            background: white;
            padding: 10px 18px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .06);
            font-weight: 700;
            color: var(--pink);
            font-size: 14px;
        }


        /* ACTIONS */
        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            margin-top: 100px;
        }

        .btn {
            border: none;
            padding: 14px 25px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .clear {
            background: linear-gradient(135deg, #ff4d94, #ff7bb8);
            color: white;
        }

        .back {
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
        }

        /* GRID */
        #savedProducts {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, .8);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .08);
            transition: .4s;
            animation: fade .5s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(255, 77, 148, .15);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            padding: 20px;
            background: white;
        }

        .content {
            padding: 20px;
        }

        .card h3 {
            font-size: 15px;
            line-height: 2;
            min-height: 60px;
            color: #222;
        }

        .price {
            margin-top: 10px;
            font-size: 20px;
            font-weight: 900;
            color: var(--pink);
        }

        /* DELETE */
        .delete {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #ffeded;
            color: #ff3b7a;
            font-weight: 800;
            cursor: pointer;
            transition: .3s;
        }

        .delete:hover {
            background: #ff3b7a;
            color: white;
        }

        /* EMPTY */
        .empty {
            grid-column: 1/-1;
            text-align: center;
            padding: 70px 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .06);
        }

        .empty h2 {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .empty p {
            color: #777;
        }
    </style>
</head>

<body>

    <div class="header">



        <div class="info-box">
            تعداد: <span id="productCount">0</span>
        </div>

        <div class="info-box">
            جمع قیمت: <span id="totalPrice">0</span>
        </div>

    </div>

    <div class="actions">
        <button class="btn clear" onclick="clearAll()">حذف همه</button>
        <button class="btn back" onclick="history.back()">بازگشت</button>
    </div>

    <div id="savedProducts"></div>

    <script>

        let products = JSON.parse(localStorage.getItem("savedProducts")) || [];
        const container = document.getElementById("savedProducts");

        function render() {

            document.getElementById("productCount").innerText = products.length;

            let total = 0;

            products.forEach(p => {
                total += parseInt(p.price.replace(/\D/g, '')) || 0;
            });

            document.getElementById("totalPrice").innerText =
                total.toLocaleString() + " تومان";

            if (products.length === 0) {
                container.innerHTML = `
      <div class="empty">
        <h2>سبد ذخیره خالی است 🌸</h2>
        <p>هنوز هیچ محصولی اضافه نکردی</p>
      </div>`;
                return;
            }

            container.innerHTML = "";

            products.forEach((p, i) => {

                container.innerHTML += `
      <div class="card">

        <img src="${p.image}">

        <div class="content">

          <h3>${p.title}</h3>

          <div class="price">${p.price}</div>

          <button class="delete" onclick="removeItem(${i})">
            حذف محصول
          </button>

        </div>

      </div>
    `;
            });

        }

        function removeItem(i) {
            products.splice(i, 1);
            localStorage.setItem("savedProducts", JSON.stringify(products));
            render();
        }

        function clearAll() {
            products = [];
            localStorage.setItem("savedProducts", "[]");
            render();
        }

        render();

    </script>

</body>

</html>
