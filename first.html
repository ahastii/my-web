<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود و ثبت‌نام</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <link rel="stylesheet" href="style2.css">
    <style>
        /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Vazirmatn', sans-serif;
}

body {
    direction: rtl;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #E195AB, #1e293b, #2563eb);
    overflow: hidden;
    position: relative;
    color: white;
}

/* دایره‌های نورانی */
.blur-circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    animation: float 8s infinite ease-in-out;
}

.circle1 {
    width: 300px;
    height: 300px;
    background: #2563eb;
    top: -100px;
    right: -100px;
}

.circle2 {
    width: 350px;
    height: 350px;
    background: #4f46e5;
    left: -100px;
    bottom: -100px;
    animation-delay: 2s;
}

@keyframes float {
    50% {
        transform: translateY(-30px);
    }
}

/* کارت اصلی */
.container {
    width: 90%;
    max-width: 500px;
    padding: 45px;
    border-radius: 30px;
    background: rgba(255, 255, 255, .08);
    backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, .1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
    animation: fadeUp 1s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* لوگو */
.logo img {
    height: 90px;
    display: block;
    margin: 0 auto 15px;
}

/* تب‌ها */
.tabs {
    display: flex;
    background: rgba(255, 255, 255, .05);
    border-radius: 18px;
    padding: 6px;
    margin-bottom: 25px;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    cursor: pointer;
    border-radius: 14px;
    color: #cbd5e1;
    transition: .3s;
}

.tab.active {
    background: white;
    color: #1e293b;
    font-weight: bold;
}

/* فرم‌ها */
.form-section {
    display: none;
}

.active-tab-content {
    display: block;
}

/* input group */
.form-group {
    position: relative;
    margin-bottom: 20px;
}

.form-group input {
    width: 100%;
    padding: 16px 45px 16px 45px;
    border: none;
    outline: none;
    border-radius: 16px;
    background: rgba(255, 255, 255, .08);
    color: white;
    font-size: 14px;
    transition: .3s;
}

.form-group input:focus {
    background: rgba(255, 255, 255, .15);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, .25);
}

/* label floating */
.form-group label {
    position: absolute;
    right: 15px;
    top: 16px;
    color: #cbd5e1;
    pointer-events: none;
    transition: .3s;
}

.form-group input:focus~label,
.form-group input:not(:placeholder-shown)~label {
    top: -10px;
    right: 35px;
    font-size: 12px;
    background: #1e293b;
    padding: 0 6px;
    color: #60a5fa;
    border-radius: 6px;
}

/* ICON */
.icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #93c5fd;
    font-size: 18px;
}

/* button */
.submit-button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    font-size: 15px;
    color: white;
    background: linear-gradient(90deg, #2563eb, #4f46e5);
    transition: .3s;
}

.submit-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(37, 99, 235, .4);
}

/* forgot */
.forgot {
    margin-top: 15px;
    text-align: center;
}

.forgot a,
.terms a {
    color: #93c5fd;
    text-decoration: none;
}

/* terms */
.terms {
    margin-top: 25px;
    text-align: center;
    font-size: 12px;
    color: #cbd5e1;
    line-height: 1.8;
}

/* responsive */
@media(max-width:600px) {
    .container {
        padding: 30px 20px;
    }
}

.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: rgba(0, 0, 0, .8);
    color: white;
    padding: 14px 20px;
    border-radius: 14px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(20px);
    transition: all .4s ease;
    z-index: 9999;
    backdrop-filter: blur(10px);
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast.success {
    border-right: 4px solid #22c55e;
}

.toast.error {
    border-right: 4px solid #ef4444;
}
    </style>
</head>

<body>

    <!-- دایره‌های نورانی -->
    <div class="blur-circle circle1"></div>
    <div class="blur-circle circle2"></div>

    <div class="container">

        <div class="logo">
            <img src="image/icon2.png" alt="بیوتی شاپ">
        </div>

        <!-- تب‌ها -->
        <div class="tabs">
            <div class="tab active" data-tab="login">
                ورود
            </div>

            <div class="tab" data-tab="signup">
                ثبت‌نام
            </div>
        </div>


        <!-- فرم ورود -->
        <div id="login-form" class="form-section active-tab-content">

            <div class="form-group">
                <i class="fa-regular fa-user icon"></i>
                <input type="text" id="login-email" placeholder=" ">
                <label>شماره موبایل یا ایمیل</label>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="login-password" placeholder=" ">
                <label>رمز عبور</label>
            </div>
            <button class="submit-button" id="loginBtn" type="button">
                ورود
            </button>

            <div class="forgot">
                <a href="#">فراموشی رمز عبور؟</a>
            </div>

        </div>


        <!-- فرم ثبت نام -->
        <div id="signup-form" class="form-section">

            <div class="form-group">
                <i class="fa-solid fa-envelope icon"></i>
                <input type="text" id="signup-email" placeholder=" ">
                <label>شماره موبایل یا ایمیل</label>
            </div>

            <div class="form-group">
                <i class="fa-regular fa-user icon"></i>
                <input type="text" id="fullname" placeholder=" ">
                <label>نام و نام خانوادگی</label>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="signup-password" placeholder=" ">
                <label>رمز عبور</label>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-shield-halved icon"></i>
                <input type="password" id="repeat-password" placeholder=" ">
                <label>تکرار رمز عبور</label>
            </div>

            <button class="submit-button" id="signupBtn" type="button">
                ثبت‌نام
            </button>
        </div>


        <div class="terms">
            با ورود یا ثبت‌نام، شما با
            <a href="#">شرایط استفاده</a>
            و
            <a href="#">حریم خصوصی</a>
            موافق هستید.
        </div>

    </div>

    <script src="js/main.js"></script>
    <div id="toast" class="toast"></div>

</body>

</html>
